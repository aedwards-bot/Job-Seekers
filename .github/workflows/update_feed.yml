name: Run Opportunity Pipeline

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/15 * * * *'
  # Allows you to manually trigger the script from the Actions tab anytime
  workflow_dispatch: 

permissions:
  contents: write  # Critical permission to let GitHub push changes back to your repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install the dependencies your script requires
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser openai

    # 4. Execute the Python script using your saved secret key
    - name: Run Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python rss_parser.py

    # 5. Commit and push the updated json and text files back to GitHub
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add opportunities.json processed_guids.txt
        # Only commit if changes actually exist to avoid unnecessary pipeline errors
        git diff-index --quiet HEAD || git commit -m "Automated feed sync: updated opportunities data"
        git push
