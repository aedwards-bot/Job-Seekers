name: Update AI Opportunities Feed

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every hour
  workflow_dispatch: # Allows you to run it manually with a button click

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser openai

    - name: Run AI Parser Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python rss_parser.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add opportunities.json processed_guids.txt
        git diff-index --quiet HEAD || git commit -m "Automated feed update"
        git push
